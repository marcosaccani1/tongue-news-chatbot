name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5050
          VITE_SENTRY_DSN: ""
          VITE_APP_ENV: ci
          VITE_ENABLE_SENTRY_TEST: "false"

  backend-quality:
    name: Backend lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend lint
        run: npm run lint

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest

    needs:
      - frontend-quality
      - backend-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build backend Docker image
        run: docker build -t tongue-backend:ci ./backend

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:5050 \
            --build-arg VITE_SENTRY_DSN="${{ vars.VITE_SENTRY_DSN }}" \
            --build-arg VITE_APP_ENV=ci \
            --build-arg VITE_ENABLE_SENTRY_TEST=false \
            -t tongue-frontend:ci \
            ./frontend

  deploy-production:
    name: Deploy frontend to Netlify
    runs-on: ubuntu-latest

    needs:
      - frontend-quality
      - backend-quality
      - docker-build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production frontend
        working-directory: frontend
        shell: bash
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_APP_ENV: production
          VITE_ENABLE_SENTRY_TEST: "true"
        run: |
          echo "Building production frontend with Sentry enabled"
          npm run build

      - name: Verify production bundle
        shell: bash
        run: |
          if [ ! -f "frontend/dist/index.html" ]; then
            echo "Errore: frontend/dist/index.html non trovato"
            exit 1
          fi

          if ! grep -R -q "Simula errore Sentry" frontend/dist; then
            echo "Errore: il pulsante Sentry non è presente nel bundle"
            exit 1
          fi

          echo "Pulsante Sentry trovato nel bundle di produzione"
          find frontend/dist -maxdepth 2 -type f -print

      - name: Deploy verified bundle to Netlify
        shell: bash
        run: |
          npx netlify-cli@latest deploy \
            --no-build \
            --dir="$GITHUB_WORKSPACE/frontend/dist" \
            --prod \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="GitHub Actions ${GITHUB_SHA}"
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}